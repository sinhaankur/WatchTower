<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" role="img" aria-label="WatchTower modes overview">
  <defs>
    <filter id="sh" x="-5%" y="-10%" width="115%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="900" height="480" rx="16" fill="#ffffff"/>
  <rect x="0" y="0" width="900" height="72" rx="0" fill="#0f172a"/>
  <rect x="0" y="0" width="900" height="16" rx="16" fill="#0f172a"/>
  <text x="32" y="30" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="700" fill="#94a3b8" letter-spacing="3">WATCHTOWER</text>
  <text x="32" y="56" font-family="Arial,Helvetica,sans-serif" font-size="26" font-weight="800" fill="#ffffff">Two operating modes — one control plane</text>
  <!-- Mode 1 card -->
  <rect x="32" y="100" width="400" height="356" rx="14" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="32" y="100" width="400" height="6" rx="4" fill="#f59e0b"/>
  <text x="56" y="136" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="700" fill="#92400e" letter-spacing="2">MODE 1</text>
  <text x="56" y="164" font-family="Arial,Helvetica,sans-serif" font-size="22" font-weight="800" fill="#0f172a">Podman Auto-Update</text>
  <text x="56" y="190" font-family="Arial,Helvetica,sans-serif" font-size="14" fill="#64748b">Keep existing containers current.</text>
  <text x="56" y="208" font-family="Arial,Helvetica,sans-serif" font-size="14" fill="#64748b">Poll images, pull, restart, verify health.</text>
  <rect x="56" y="232" width="100" height="44" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="106" y="250" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="700" fill="#64748b" text-anchor="middle">INPUT</text>
  <text x="106" y="267" font-family="Arial,Helvetica,sans-serif" font-size="12" font-weight="700" fill="#0f172a" text-anchor="middle">Podman host</text>
  <line x1="156" y1="254" x2="182" y2="254" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="178,249 188,254 178,259" fill="#94a3b8"/>
  <rect x="188" y="232" width="100" height="44" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="238" y="250" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="700" fill="#64748b" text-anchor="middle">ENGINE</text>
  <text x="238" y="267" font-family="Arial,Helvetica,sans-serif" font-size="12" font-weight="700" fill="#0f172a" text-anchor="middle">Poll + restart</text>
  <line x1="288" y1="254" x2="314" y2="254" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="310,249 320,254 310,259" fill="#94a3b8"/>
  <rect x="320" y="232" width="90" height="44" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
  <text x="365" y="250" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="700" fill="#047857" text-anchor="middle">RESULT</text>
  <text x="365" y="267" font-family="Arial,Helvetica,sans-serif" font-size="12" font-weight="700" fill="#047857" text-anchor="middle">Healthy</text>
  <rect x="56" y="308" width="356" height="124" rx="10" fill="#fffbeb" stroke="#fde68a" stroke-width="1.5"/>
  <text x="76" y="334" font-family="Arial,Helvetica,sans-serif" font-size="13" font-weight="700" fill="#92400e">When to use</text>
  <text x="76" y="356" font-family="Arial,Helvetica,sans-serif" font-size="13" fill="#78350f">Your release process already exists.</text>
  <text x="76" y="374" font-family="Arial,Helvetica,sans-serif" font-size="13" fill="#78350f">You need safe image updates, health</text>
  <text x="76" y="392" font-family="Arial,Helvetica,sans-serif" font-size="13" fill="#78350f">checks, and low-touch host upkeep.</text>
  <!-- Mode 2 card -->
  <rect x="468" y="100" width="400" height="356" rx="14" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="468" y="100" width="400" height="6" rx="4" fill="#3b82f6"/>
  <text x="492" y="136" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="700" fill="#1d4ed8" letter-spacing="2">MODE 2</text>
  <text x="492" y="164" font-family="Arial,Helvetica,sans-serif" font-size="22" font-weight="800" fill="#0f172a">App Center</text>
  <text x="492" y="190" font-family="Arial,Helvetica,sans-serif" font-size="14" fill="#64748b">Ship apps across multiple nodes.</text>
  <text x="492" y="208" font-family="Arial,Helvetica,sans-serif" font-size="14" fill="#64748b">Register, package, deploy, promote.</text>
  <rect x="492" y="232" width="100" height="44" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="542" y="250" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="700" fill="#64748b" text-anchor="middle">INPUT</text>
  <text x="542" y="267" font-family="Arial,Helvetica,sans-serif" font-size="12" font-weight="700" fill="#0f172a" text-anchor="middle">App registry</text>
  <line x1="592" y1="254" x2="618" y2="254" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="614,249 624,254 614,259" fill="#94a3b8"/>
  <rect x="624" y="232" width="100" height="44" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="674" y="250" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="700" fill="#64748b" text-anchor="middle">ENGINE</text>
  <text x="674" y="267" font-family="Arial,Helvetica,sans-serif" font-size="12" font-weight="700" fill="#0f172a" text-anchor="middle">SSH rollout</text>
  <line x1="724" y1="254" x2="750" y2="254" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="746,249 756,254 746,259" fill="#94a3b8"/>
  <rect x="756" y="232" width="90" height="44" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="801" y="250" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="700" fill="#1d4ed8" text-anchor="middle">RESULT</text>
  <text x="801" y="267" font-family="Arial,Helvetica,sans-serif" font-size="12" font-weight="700" fill="#1d4ed8" text-anchor="middle">Live app</text>
  <rect x="492" y="308" width="356" height="124" rx="10" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="512" y="334" font-family="Arial,Helvetica,sans-serif" font-size="13" font-weight="700" fill="#1d4ed8">When to use</text>
  <text x="512" y="356" font-family="Arial,Helvetica,sans-serif" font-size="13" fill="#1e40af">WatchTower as your compact deploy</text>
  <text x="512" y="374" font-family="Arial,Helvetica,sans-serif" font-size="13" fill="#1e40af">control plane for websites, APIs,</text>
  <text x="512" y="392" font-family="Arial,Helvetica,sans-serif" font-size="13" fill="#1e40af">and multi-node rollouts.</text>
  <text x="450" y="284" font-family="Arial,Helvetica,sans-serif" font-size="13" font-weight="700" fill="#cbd5e1" text-anchor="middle">OR</text>
</svg>
