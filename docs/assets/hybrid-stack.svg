<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="WatchTower hybrid stack overview">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffaf0" />
      <stop offset="100%" stop-color="#f3f8ff" />
    </linearGradient>
    <style>
      .title { font: 800 50px 'DM Sans', Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 23px 'DM Sans', Arial, sans-serif; fill: #475569; }
      .eyebrow { font: 700 20px 'Space Mono', monospace; letter-spacing: 2px; fill: #b91c1c; }
      .boxTitle { font: 800 24px 'DM Sans', Arial, sans-serif; fill: #0f172a; }
      .boxCopy { font: 500 19px 'DM Sans', Arial, sans-serif; fill: #475569; }
      .tag { font: 700 17px 'DM Sans', Arial, sans-serif; }
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)" />
  <circle cx="250" cy="100" r="160" fill="#fde68a" opacity="0.22" />
  <circle cx="1360" cy="150" r="160" fill="#dbeafe" opacity="0.4" />

  <text x="90" y="92" class="eyebrow">HYBRID RUNTIME MAP</text>
  <text x="90" y="152" class="title">Connect local control, remote services, and managed data paths.</text>
  <text x="90" y="190" class="subtitle">Show how WatchTower can stay local-first while still orchestrating remote databases, services, and edge-facing applications.</text>

  <rect x="120" y="310" width="320" height="200" rx="28" fill="#ffffff" stroke="#1f2937" stroke-width="3" />
  <text x="192" y="380" class="boxTitle">Operator Workspace</text>
  <text x="158" y="420" class="boxCopy">Local dashboard, CLI, package build,</text>
  <text x="170" y="450" class="boxCopy">GitHub workflows, and release intent.</text>

  <rect x="640" y="250" width="320" height="200" rx="28" fill="#ffffff" stroke="#1f2937" stroke-width="3" />
  <text x="708" y="320" class="boxTitle">WatchTower API</text>
  <text x="684" y="360" class="boxCopy">Auth, deployment plans, runtime</text>
  <text x="696" y="390" class="boxCopy">inspection, and secure actions.</text>

  <rect x="1130" y="300" width="320" height="200" rx="28" fill="#ffffff" stroke="#1f2937" stroke-width="3" />
  <text x="1198" y="370" class="boxTitle">Managed Services</text>
  <text x="1168" y="410" class="boxCopy">Cloud databases, tunnels, DNS,</text>
  <text x="1170" y="440" class="boxCopy">or external delivery layers.</text>

  <rect x="360" y="600" width="320" height="180" rx="28" fill="#ffffff" stroke="#1f2937" stroke-width="3" />
  <text x="430" y="665" class="boxTitle">App Nodes</text>
  <text x="396" y="703" class="boxCopy">Linux servers that receive builds,</text>
  <text x="410" y="732" class="boxCopy">run services, and expose apps.</text>

  <rect x="930" y="600" width="320" height="180" rx="28" fill="#ffffff" stroke="#1f2937" stroke-width="3" />
  <text x="995" y="665" class="boxTitle">Data Plane</text>
  <text x="960" y="703" class="boxCopy">Hybrid database connectivity and</text>
  <text x="972" y="732" class="boxCopy">service-to-service integration.</text>

  <line x1="440" y1="410" x2="640" y2="350" stroke="#1f2937" stroke-width="4" stroke-linecap="round" />
  <polygon points="624,344 648,348 630,364" fill="#1f2937" />
  <line x1="960" y1="350" x2="1130" y2="390" stroke="#1f2937" stroke-width="4" stroke-linecap="round" />
  <polygon points="1114,379 1138,392 1111,401" fill="#1f2937" />
  <line x1="780" y1="450" x2="560" y2="600" stroke="#1f2937" stroke-width="4" stroke-linecap="round" />
  <polygon points="572,581 550,607 582,599" fill="#1f2937" />
  <line x1="880" y1="450" x2="1030" y2="600" stroke="#1f2937" stroke-width="4" stroke-linecap="round" />
  <polygon points="1009,592 1036,607 1018,580" fill="#1f2937" />
  <line x1="680" y1="690" x2="930" y2="690" stroke="#10b981" stroke-width="5" stroke-dasharray="10 10" stroke-linecap="round" />

  <rect x="580" y="640" width="150" height="42" rx="21" fill="#ecfdf5" stroke="#10b981" stroke-width="2" />
  <text x="615" y="667" class="tag" fill="#047857">App traffic</text>
  <rect x="990" y="540" width="200" height="42" rx="21" fill="#eff6ff" stroke="#2563eb" stroke-width="2" />
  <text x="1035" y="567" class="tag" fill="#1d4ed8">Managed service links</text>
</svg>