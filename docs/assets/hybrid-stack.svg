<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" role="img" aria-label="WatchTower hybrid stack">
  <defs>
    <filter id="sh" x="-5%" y="-10%" width="115%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
  </defs>
  <rect width="900" height="400" rx="16" fill="#ffffff"/>
  <rect x="0" y="0" width="900" height="60" rx="0" fill="#0f172a"/>
  <rect x="0" y="0" width="900" height="16" rx="16" fill="#0f172a"/>
  <text x="32" y="26" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="700" fill="#94a3b8" letter-spacing="3">HYBRID STACK</text>
  <text x="32" y="48" font-family="Arial,Helvetica,sans-serif" font-size="22" font-weight="800" fill="#ffffff">Control plane local — data and services anywhere</text>
  <!-- Row 1: local -->
  <rect x="24" y="88" width="200" height="110" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="24" y="88" width="200" height="5" rx="4" fill="#0f172a"/>
  <text x="44" y="116" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="700" fill="#64748b" letter-spacing="2">LOCAL</text>
  <text x="44" y="140" font-family="Arial,Helvetica,sans-serif" font-size="16" font-weight="800" fill="#0f172a">Operator Workstation</text>
  <text x="44" y="160" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#64748b">Dashboard, CLI, package</text>
  <text x="44" y="178" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#64748b">builder. Stays on-prem.</text>
  <line x1="224" y1="143" x2="280" y2="143" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="276,138 286,143 276,148" fill="#94a3b8"/>
  <!-- WatchTower API -->
  <rect x="286" y="88" width="200" height="110" rx="12" fill="#0f172a" filter="url(#sh)"/>
  <rect x="286" y="88" width="200" height="5" rx="4" fill="#3b82f6"/>
  <text x="306" y="116" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="700" fill="#94a3b8" letter-spacing="2">CONTROL PLANE</text>
  <text x="306" y="140" font-family="Arial,Helvetica,sans-serif" font-size="16" font-weight="800" fill="#ffffff">WatchTower API</text>
  <text x="306" y="160" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#94a3b8">Orchestrates rollouts,</text>
  <text x="306" y="178" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#94a3b8">stores state and config.</text>
  <!-- Arrows right -->
  <line x1="486" y1="120" x2="534" y2="90" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="527,84 540,88 530,96" fill="#94a3b8"/>
  <line x1="486" y1="143" x2="534" y2="143" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="530,138 540,143 530,148" fill="#94a3b8"/>
  <line x1="486" y1="166" x2="534" y2="196" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="527,196 540,200 530,208" fill="#94a3b8"/>
  <!-- Remote services column -->
  <rect x="540" y="68" width="336" height="80" rx="12" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#sh)"/>
  <text x="560" y="94" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="700" fill="#1d4ed8" letter-spacing="2">MANAGED SERVICES</text>
  <text x="560" y="118" font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="700" fill="#1e40af">Postgres · Redis · S3 · External APIs</text>
  <text x="560" y="136" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#3b82f6">Hosted wherever fits your stack.</text>
  <rect x="540" y="170" width="156" height="80" rx="12" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5" filter="url(#sh)"/>
  <text x="560" y="196" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="700" fill="#047857" letter-spacing="2">APP NODES</text>
  <text x="560" y="218" font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="700" fill="#0f172a">Linux hosts</text>
  <text x="560" y="236" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#065f46">Apps deployed via SSH.</text>
  <rect x="720" y="170" width="156" height="80" rx="12" fill="#fdf4ff" stroke="#d8b4fe" stroke-width="1.5" filter="url(#sh)"/>
  <text x="740" y="196" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="700" fill="#7e22ce" letter-spacing="2">DATA PLANE</text>
  <text x="740" y="218" font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="700" fill="#0f172a">Storage / DB</text>
  <text x="740" y="236" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#7e22ce">Persists app data.</text>
  <!-- Summary bar -->
  <rect x="24" y="300" width="852" height="76" rx="12" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="44" y="326" font-family="Arial,Helvetica,sans-serif" font-size="13" font-weight="700" fill="#0f172a">When to use this pattern</text>
  <text x="44" y="348" font-family="Arial,Helvetica,sans-serif" font-size="13" fill="#475569">Your team owns the infra. The control plane runs locally or on a private server, but databases,</text>
  <text x="44" y="366" font-family="Arial,Helvetica,sans-serif" font-size="13" fill="#475569">caches, or managed services live remotely. WatchTower bridges the two without a hosted PaaS.</text>
</svg>
