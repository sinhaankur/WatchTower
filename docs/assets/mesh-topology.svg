<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" role="img" aria-label="WatchTower mesh topology">
  <defs>
    <filter id="sh" x="-5%" y="-10%" width="115%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
  </defs>
  <rect width="900" height="420" rx="16" fill="#ffffff"/>
  <rect x="0" y="0" width="900" height="60" rx="0" fill="#0f172a"/>
  <rect x="0" y="0" width="900" height="16" rx="16" fill="#0f172a"/>
  <text x="32" y="26" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="700" fill="#94a3b8" letter-spacing="3">MESH TOPOLOGY</text>
  <text x="32" y="48" font-family="Arial,Helvetica,sans-serif" font-size="22" font-weight="800" fill="#ffffff">Preview and live traffic share one control plane</text>
  <!-- Operator -->
  <rect x="24" y="88" width="160" height="100" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5" filter="url(#sh)"/>
  <text x="44" y="114" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="700" fill="#64748b" letter-spacing="2">OPERATOR</text>
  <text x="44" y="138" font-family="Arial,Helvetica,sans-serif" font-size="16" font-weight="800" fill="#0f172a">Team / CI</text>
  <text x="44" y="158" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#64748b">Triggers deploys</text>
  <text x="44" y="174" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#64748b">and reads status.</text>
  <!-- Arrow op → control -->
  <line x1="184" y1="138" x2="314" y2="138" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="310,133 320,138 310,143" fill="#94a3b8"/>
  <!-- Control plane -->
  <rect x="320" y="78" width="260" height="120" rx="12" fill="#0f172a" stroke="#0f172a" stroke-width="0" filter="url(#sh)"/>
  <text x="344" y="106" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="700" fill="#94a3b8" letter-spacing="2">CONTROL PLANE</text>
  <text x="344" y="130" font-family="Arial,Helvetica,sans-serif" font-size="18" font-weight="800" fill="#ffffff">WatchTower API</text>
  <text x="344" y="152" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#94a3b8">Stores rollout intent, coordinates</text>
  <text x="344" y="168" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#94a3b8">nodes, decides active slot.</text>
  <!-- Arrow control → edge -->
  <line x1="580" y1="138" x2="700" y2="138" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="696,133 706,138 696,143" fill="#94a3b8"/>
  <!-- Traffic edge -->
  <rect x="706" y="88" width="168" height="100" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5" filter="url(#sh)"/>
  <text x="724" y="114" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="700" fill="#64748b" letter-spacing="2">TRAFFIC EDGE</text>
  <text x="724" y="138" font-family="Arial,Helvetica,sans-serif" font-size="15" font-weight="800" fill="#0f172a">Caddy / CF</text>
  <text x="724" y="158" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#64748b">Routes requests to</text>
  <text x="724" y="174" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#64748b">the active slot.</text>
  <!-- Arrow control → preview (down-left) -->
  <path d="M 390 198 L 390 240 L 140 240 L 140 300" fill="none" stroke="#3b82f6" stroke-width="2" stroke-dasharray="8 5"/>
  <polygon points="135,296 140,308 145,296" fill="#3b82f6"/>
  <!-- Arrow control → live (down-right) -->
  <path d="M 510 198 L 510 240 L 760 240 L 760 300" fill="none" stroke="#10b981" stroke-width="2" stroke-dasharray="8 5"/>
  <polygon points="755,296 760,308 765,296" fill="#10b981"/>
  <!-- Preview slot -->
  <rect x="24" y="308" width="230" height="88" rx="12" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" filter="url(#sh)"/>
  <text x="44" y="334" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="700" fill="#1d4ed8" letter-spacing="2">PREVIEW SLOT</text>
  <text x="44" y="358" font-family="Arial,Helvetica,sans-serif" font-size="16" font-weight="800" fill="#0f172a">Preview nodes</text>
  <text x="44" y="378" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#1e40af">Branch builds before promotion.</text>
  <!-- Live slot -->
  <rect x="646" y="308" width="230" height="88" rx="12" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5" filter="url(#sh)"/>
  <text x="666" y="334" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="700" fill="#047857" letter-spacing="2">LIVE SLOT</text>
  <text x="666" y="358" font-family="Arial,Helvetica,sans-serif" font-size="16" font-weight="800" fill="#0f172a">Live nodes</text>
  <text x="666" y="378" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#065f46">Stable public traffic after promotion.</text>
  <!-- Legend -->
  <line x1="350" y1="360" x2="378" y2="360" stroke="#3b82f6" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="384" y="365" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#3b82f6">preview path</text>
  <line x1="480" y1="360" x2="508" y2="360" stroke="#10b981" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="514" y="365" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#10b981">live path</text>
</svg>
