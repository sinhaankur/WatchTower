<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="WatchTower mesh topology">
  <defs>
    <filter id="cs" x="-4%" y="-4%" width="112%" height="116%">
      <feDropShadow dx="3" dy="3" stdDeviation="0" flood-color="#1f2937"/>
    </filter>
    <filter id="ps" x="-2%" y="-8%" width="108%" height="132%">
      <feDropShadow dx="2" dy="2" stdDeviation="0" flood-color="#1f2937"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="#fbf6ea"/>
  <circle cx="130" cy="130" r="120" fill="#fde68a" opacity="0.28"/>
  <circle cx="1490" cy="160" r="160" fill="#dbeafe" opacity="0.35"/>
    <text x="80" y="82" font-family="'Space Mono', monospace" font-size="18" font-weight="700" fill="#b91c1c" letter-spacing="2">MESH TOPOLOGY</text>
    <text x="80" y="140" font-family="'DM Sans', Arial, sans-serif" font-size="44" font-weight="800" fill="#0f172a">Control previews, live traffic, and fleet edges in one map.</text>
    <text x="80" y="180" font-family="'DM Sans', Arial, sans-serif" font-size="21" font-weight="500" fill="#475569">Operator entrypoint, control plane decisions, and staged traffic across edge nodes.</text>
  <!-- Control Plane (centre) -->
    <rect x="630" y="290" width="340" height="180" rx="20" fill="#ffffff" stroke="#1f2937" stroke-width="2" filter="url(#cs)"/>
    <rect x="660" y="308" width="140" height="28" rx="14" fill="#fde68a" stroke="#1f2937" stroke-width="1.5" filter="url(#ps)"/>
  <text x="672" y="327" font-family="'Space Mono', monospace" font-size="13" font-weight="700" fill="#7f1d1d">CONTROL PLANE</text>
    <text x="660" y="368" font-family="'DM Sans', Arial, sans-serif" font-size="22" font-weight="800" fill="#0f172a">WatchTower API</text>
    <text x="660" y="402" font-family="'DM Sans', Arial, sans-serif" font-size="16" font-weight="500" fill="#475569">Dashboard, deploy decisions,</text>
    <text x="660" y="424" font-family="'DM Sans', Arial, sans-serif" font-size="16" font-weight="500" fill="#475569">and node coordination.</text>
  <!-- Developer (left) -->
    <rect x="130" y="300" width="280" height="160" rx="20" fill="#ffffff" stroke="#1f2937" stroke-width="2" filter="url(#cs)"/>
    <rect x="152" y="318" width="100" height="28" rx="14" fill="#fde68a" stroke="#1f2937" stroke-width="1.5" filter="url(#ps)"/>
  <text x="164" y="337" font-family="'Space Mono', monospace" font-size="13" font-weight="700" fill="#7f1d1d">DEVELOPER</text>
    <text x="152" y="376" font-family="'DM Sans', Arial, sans-serif" font-size="22" font-weight="800" fill="#0f172a">Operator</text>
    <text x="152" y="410" font-family="'DM Sans', Arial, sans-serif" font-size="16" font-weight="500" fill="#475569">Triggers deploys, reads</text>
    <text x="152" y="432" font-family="'DM Sans', Arial, sans-serif" font-size="16" font-weight="500" fill="#475569">rollout status.</text>
  <!-- Traffic Layer (top right) -->
    <rect x="1170" y="220" width="310" height="160" rx="20" fill="#ffffff" stroke="#1f2937" stroke-width="2" filter="url(#cs)"/>
    <rect x="1190" y="238" width="128" height="28" rx="14" fill="#fde68a" stroke="#1f2937" stroke-width="1.5" filter="url(#ps)"/>
  <text x="1202" y="257" font-family="'Space Mono', monospace" font-size="13" font-weight="700" fill="#7f1d1d">TRAFFIC LAYER</text>
    <text x="1190" y="296" font-family="'DM Sans', Arial, sans-serif" font-size="22" font-weight="800" fill="#0f172a">Caddy / Cloudflare</text>
    <text x="1190" y="330" font-family="'DM Sans', Arial, sans-serif" font-size="16" font-weight="500" fill="#475569">Routes domain to active</text>
    <text x="1190" y="352" font-family="'DM Sans', Arial, sans-serif" font-size="16" font-weight="500" fill="#475569">live or preview slot.</text>
  <!-- Live Nodes (bottom right) -->
    <rect x="1130" y="520" width="330" height="160" rx="20" fill="#ffffff" stroke="#1f2937" stroke-width="2" filter="url(#cs)"/>
    <rect x="1152" y="540" width="100" height="28" rx="14" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
  <text x="1164" y="559" font-family="'Space Mono', monospace" font-size="13" font-weight="700" fill="#047857">LIVE</text>
    <text x="1152" y="604" font-family="'DM Sans', Arial, sans-serif" font-size="22" font-weight="800" fill="#0f172a">Live Nodes</text>
    <text x="1152" y="638" font-family="'DM Sans', Arial, sans-serif" font-size="16" font-weight="500" fill="#475569">Stable public traffic.</text>
    <text x="1152" y="660" font-family="'DM Sans', Arial, sans-serif" font-size="16" font-weight="500" fill="#475569">Current production set.</text>
  <!-- Preview Nodes (bottom left) -->
    <rect x="140" y="560" width="330" height="160" rx="20" fill="#ffffff" stroke="#1f2937" stroke-width="2" filter="url(#cs)"/>
    <rect x="162" y="580" width="128" height="28" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="174" y="599" font-family="'Space Mono', monospace" font-size="13" font-weight="700" fill="#1d4ed8">PREVIEW</text>
    <text x="162" y="644" font-family="'DM Sans', Arial, sans-serif" font-size="22" font-weight="800" fill="#0f172a">Preview Nodes</text>
    <text x="162" y="678" font-family="'DM Sans', Arial, sans-serif" font-size="16" font-weight="500" fill="#475569">Branch and candidate builds.</text>
  <!-- Arrows -->
  <!-- Dev → Control -->
  <line x1="410" y1="380" x2="628" y2="380" stroke="#1f2937" stroke-width="4" stroke-linecap="round"/>
  <polygon points="617,369 641,380 617,391" fill="#1f2937"/>
  <!-- Control → Traffic -->
  <line x1="970" y1="360" x2="1168" y2="310" stroke="#1f2937" stroke-width="4" stroke-linecap="round"/>
  <polygon points="1155,302 1178,308 1160,322" fill="#1f2937"/>
  <!-- Control → Live -->
  <line x1="880" y1="470" x2="1128" y2="540" stroke="#1f2937" stroke-width="4" stroke-linecap="round"/>
  <polygon points="1114,530 1138,543 1113,553" fill="#1f2937"/>
  <!-- Control → Preview -->
  <line x1="720" y1="470" x2="410" y2="560" stroke="#1f2937" stroke-width="4" stroke-linecap="round"/>
  <polygon points="421,543 399,562 428,564" fill="#1f2937"/>
  <!-- Traffic → Live dashed -->
  <line x1="1290" y1="380" x2="1290" y2="518" stroke="#10b981" stroke-width="5" stroke-dasharray="10 10" stroke-linecap="round"/>
  <!-- Preview vertical dashed -->
  <line x1="300" y1="558" x2="300" y2="460" stroke="#2563eb" stroke-width="5" stroke-dasharray="10 10" stroke-linecap="round"/>
  <!-- Legend -->
    <rect x="1110" y="752" width="174" height="28" rx="14" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
  <text x="1122" y="771" font-family="'Space Mono', monospace" font-size="13" font-weight="700" fill="#047857">Stable traffic path</text>
    <rect x="130" y="752" width="204" height="28" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="142" y="771" font-family="'Space Mono', monospace" font-size="13" font-weight="700" fill="#1d4ed8">Preview and branch path</text>
</svg>