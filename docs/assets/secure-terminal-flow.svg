<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" role="img" aria-label="WatchTower secure terminal flow">
  <defs>
    <filter id="sh" x="-5%" y="-10%" width="115%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
  </defs>
  <rect width="900" height="360" rx="16" fill="#ffffff"/>
  <rect x="0" y="0" width="900" height="60" rx="0" fill="#0f172a"/>
  <rect x="0" y="0" width="900" height="16" rx="16" fill="#0f172a"/>
  <text x="32" y="26" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="700" fill="#94a3b8" letter-spacing="3">SECURE TERMINAL</text>
  <text x="32" y="48" font-family="Arial,Helvetica,sans-serif" font-size="22" font-weight="800" fill="#ffffff">Guided host ops — no raw shell exposed</text>
  <!-- Steps -->
  <rect x="24" y="88" width="156" height="200" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="24" y="88" width="156" height="5" rx="4" fill="#64748b"/>
  <text x="44" y="116" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="700" fill="#64748b" letter-spacing="2">REQUEST</text>
  <text x="44" y="144" font-family="Arial,Helvetica,sans-serif" font-size="15" font-weight="800" fill="#0f172a">Operator</text>
  <text x="44" y="162" font-family="Arial,Helvetica,sans-serif" font-size="15" font-weight="800" fill="#0f172a">picks a</text>
  <text x="44" y="180" font-family="Arial,Helvetica,sans-serif" font-size="15" font-weight="800" fill="#0f172a">command</text>
  <text x="44" y="210" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#64748b">From a strict</text>
  <text x="44" y="228" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#64748b">allowlist only.</text>
  <text x="44" y="246" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#64748b">No free text.</text>
  <line x1="180" y1="188" x2="214" y2="188" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="210,183 220,188 210,193" fill="#94a3b8"/>
  <!-- Policy gate -->
  <rect x="220" y="88" width="156" height="200" rx="12" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="220" y="88" width="156" height="5" rx="4" fill="#f97316"/>
  <text x="240" y="116" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="700" fill="#c2410c" letter-spacing="2">POLICY GATE</text>
  <text x="240" y="144" font-family="Arial,Helvetica,sans-serif" font-size="15" font-weight="800" fill="#0f172a">Allowlist</text>
  <text x="240" y="162" font-family="Arial,Helvetica,sans-serif" font-size="15" font-weight="800" fill="#0f172a">check</text>
  <text x="240" y="210" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#9a3412">Command-level</text>
  <text x="240" y="228" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#9a3412">sudo controls.</text>
  <text x="240" y="246" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#9a3412">Blocked if unknown.</text>
  <line x1="376" y1="188" x2="410" y2="188" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="406,183 416,188 406,193" fill="#94a3b8"/>
  <!-- Execution -->
  <rect x="416" y="88" width="156" height="200" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="416" y="88" width="156" height="5" rx="4" fill="#64748b"/>
  <text x="436" y="116" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="700" fill="#64748b" letter-spacing="2">EXECUTION</text>
  <text x="436" y="144" font-family="Arial,Helvetica,sans-serif" font-size="15" font-weight="800" fill="#0f172a">Runs on</text>
  <text x="436" y="162" font-family="Arial,Helvetica,sans-serif" font-size="15" font-weight="800" fill="#0f172a">target host</text>
  <text x="436" y="210" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#64748b">Via SSH with</text>
  <text x="436" y="228" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#64748b">constrained scope.</text>
  <line x1="572" y1="188" x2="606" y2="188" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="602,183 612,188 602,193" fill="#94a3b8"/>
  <!-- Audit -->
  <rect x="612" y="88" width="156" height="200" rx="12" fill="#fdf4ff" stroke="#d8b4fe" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="612" y="88" width="156" height="5" rx="4" fill="#a855f7"/>
  <text x="632" y="116" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="700" fill="#7e22ce" letter-spacing="2">AUDIT</text>
  <text x="632" y="144" font-family="Arial,Helvetica,sans-serif" font-size="15" font-weight="800" fill="#0f172a">Encrypted</text>
  <text x="632" y="162" font-family="Arial,Helvetica,sans-serif" font-size="15" font-weight="800" fill="#0f172a">audit log</text>
  <text x="632" y="210" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#7e22ce">Every execution</text>
  <text x="632" y="228" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#7e22ce">is recorded and</text>
  <text x="632" y="246" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#7e22ce">encrypted at rest.</text>
  <line x1="768" y1="188" x2="802" y2="188" stroke="#10b981" stroke-width="2"/>
  <polygon points="798,183 808,188 798,193" fill="#10b981"/>
  <!-- Result -->
  <rect x="808" y="88" width="68" height="200" rx="12" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="808" y="88" width="68" height="5" rx="4" fill="#10b981"/>
  <text x="842" y="116" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="700" fill="#047857" text-anchor="middle">DONE</text>
  <text x="842" y="186" font-family="Arial,Helvetica,sans-serif" font-size="13" font-weight="800" fill="#0f172a" text-anchor="middle">Result</text>
  <text x="842" y="206" font-family="Arial,Helvetica,sans-serif" font-size="13" font-weight="800" fill="#0f172a" text-anchor="middle">back to</text>
  <text x="842" y="226" font-family="Arial,Helvetica,sans-serif" font-size="13" font-weight="800" fill="#0f172a" text-anchor="middle">operator</text>
  <!-- Note -->
  <rect x="24" y="308" width="852" height="36" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="44" y="331" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#475569">Requires WATCHTOWER_TERMINAL_AUDIT_KEY to be set. Terminal execution is disabled by design if the key is missing.</text>
</svg>
