<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="WatchTower secure terminal command flow">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffaf0" />
      <stop offset="100%" stop-color="#eef6ff" />
    </linearGradient>
    <style>
      .title { font: 800 50px 'DM Sans', Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 23px 'DM Sans', Arial, sans-serif; fill: #475569; }
      .eyebrow { font: 700 20px 'Space Mono', monospace; letter-spacing: 2px; fill: #b91c1c; }
      .boxTitle { font: 800 24px 'DM Sans', Arial, sans-serif; fill: #0f172a; }
      .boxCopy { font: 500 19px 'DM Sans', Arial, sans-serif; fill: #475569; }
      .tag { font: 700 16px 'Space Mono', monospace; }
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)" />
  <circle cx="210" cy="140" r="160" fill="#fde68a" opacity="0.22" />
  <circle cx="1400" cy="130" r="160" fill="#dbeafe" opacity="0.42" />

  <text x="90" y="92" class="eyebrow">SECURE TERMINAL FLOW</text>
  <text x="90" y="152" class="title">Allow operational commands without opening an unsafe shell path.</text>
  <text x="90" y="190" class="subtitle">A visual summary of the Host Connect terminal runner: request validation, policy gate, audited execution, and encrypted log capture.</text>

  <rect x="90" y="340" width="230" height="230" rx="28" fill="#ffffff" stroke="#1f2937" stroke-width="3" />
  <rect x="390" y="340" width="230" height="230" rx="28" fill="#ffffff" stroke="#1f2937" stroke-width="3" />
  <rect x="690" y="340" width="230" height="230" rx="28" fill="#ffffff" stroke="#1f2937" stroke-width="3" />
  <rect x="990" y="340" width="230" height="230" rx="28" fill="#ffffff" stroke="#1f2937" stroke-width="3" />
  <rect x="1290" y="340" width="230" height="230" rx="28" fill="#ffffff" stroke="#1f2937" stroke-width="3" />

  <text x="120" y="414" class="boxTitle">Host Connect UI</text>
  <text x="120" y="452" class="boxCopy">Operator selects a supported command and timeout.</text>

  <text x="420" y="414" class="boxTitle">Policy Gate</text>
  <text x="420" y="452" class="boxCopy">Allowlist, sudo rules, length limits, and argument checks.</text>

  <text x="720" y="414" class="boxTitle">Execution Path</text>
  <text x="720" y="452" class="boxCopy">No shell injection path, structured argv, controlled subprocess call.</text>

  <text x="1020" y="414" class="boxTitle">Audit Encrypt</text>
  <text x="1020" y="452" class="boxCopy">Command metadata is redacted and encrypted with Fernet.</text>

  <text x="1320" y="414" class="boxTitle">Operator Result</text>
  <text x="1320" y="452" class="boxCopy">Return stdout, stderr, exit code, and visible policy outcome.</text>

  <line x1="320" y1="455" x2="390" y2="455" stroke="#1f2937" stroke-width="4" stroke-linecap="round" />
  <polygon points="376,444 398,455 376,466" fill="#1f2937" />
  <line x1="620" y1="455" x2="690" y2="455" stroke="#1f2937" stroke-width="4" stroke-linecap="round" />
  <polygon points="676,444 698,455 676,466" fill="#1f2937" />
  <line x1="920" y1="455" x2="990" y2="455" stroke="#1f2937" stroke-width="4" stroke-linecap="round" />
  <polygon points="976,444 998,455 976,466" fill="#1f2937" />
  <line x1="1220" y1="455" x2="1290" y2="455" stroke="#1f2937" stroke-width="4" stroke-linecap="round" />
  <polygon points="1276,444 1298,455 1276,466" fill="#1f2937" />

  <rect x="1020" y="610" width="250" height="42" rx="21" fill="#ecfdf5" stroke="#10b981" stroke-width="2" />
  <text x="1056" y="637" class="tag" fill="#047857">encrypted audit record</text>
  <rect x="400" y="610" width="250" height="42" rx="21" fill="#fee2e2" stroke="#b91c1c" stroke-width="2" />
  <text x="456" y="637" class="tag" fill="#991b1b">unsafe commands blocked</text>

  <rect x="90" y="700" width="1430" height="110" rx="28" fill="#fffdf7" stroke="#1f2937" stroke-width="3" />
  <text x="130" y="746" class="boxTitle">Security intent</text>
  <text x="130" y="784" class="boxCopy">Users can run approved terminal operations from the product without enabling a general-purpose shell or losing an auditable encrypted trail.</text>
</svg>