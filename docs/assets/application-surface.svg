<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" role="img" aria-label="WatchTower application surface">
  <defs>
    <filter id="sh" x="-5%" y="-10%" width="115%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
  </defs>
  <rect width="900" height="380" rx="16" fill="#ffffff"/>
  <rect x="0" y="0" width="900" height="60" rx="0" fill="#0f172a"/>
  <rect x="0" y="0" width="900" height="16" rx="16" fill="#0f172a"/>
  <text x="32" y="26" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="700" fill="#94a3b8" letter-spacing="3">APPLICATION SURFACE</text>
  <text x="32" y="48" font-family="Arial,Helvetica,sans-serif" font-size="22" font-weight="800" fill="#ffffff">From dashboard record to public URL</text>
  <!-- Dashboard -->
  <rect x="24" y="88" width="180" height="200" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="24" y="88" width="180" height="5" rx="4" fill="#f59e0b"/>
  <text x="44" y="116" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="700" fill="#92400e" letter-spacing="2">REGISTER</text>
  <text x="44" y="142" font-family="Arial,Helvetica,sans-serif" font-size="16" font-weight="800" fill="#0f172a">Dashboard</text>
  <text x="44" y="162" font-family="Arial,Helvetica,sans-serif" font-size="16" font-weight="800" fill="#0f172a">Record</text>
  <text x="44" y="192" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#64748b">Name, nodes, repo,</text>
  <text x="44" y="210" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#64748b">and deploy config</text>
  <text x="44" y="228" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#64748b">stored in apps.json.</text>
  <line x1="204" y1="188" x2="240" y2="188" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="236,183 246,188 236,193" fill="#94a3b8"/>
  <!-- Build artifact -->
  <rect x="246" y="88" width="180" height="200" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="246" y="88" width="180" height="5" rx="4" fill="#f59e0b"/>
  <text x="266" y="116" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="700" fill="#92400e" letter-spacing="2">BUILD</text>
  <text x="266" y="142" font-family="Arial,Helvetica,sans-serif" font-size="16" font-weight="800" fill="#0f172a">Artifact</text>
  <text x="266" y="162" font-family="Arial,Helvetica,sans-serif" font-size="16" font-weight="800" fill="#0f172a">Package</text>
  <text x="266" y="192" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#64748b">tar.gz or zip created</text>
  <text x="266" y="210" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#64748b">by watchtower-package</text>
  <text x="266" y="228" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#64748b">for the target platform.</text>
  <line x1="426" y1="188" x2="462" y2="188" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="458,183 468,188 458,193" fill="#94a3b8"/>
  <!-- SSH deploy -->
  <rect x="468" y="88" width="180" height="200" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="468" y="88" width="180" height="5" rx="4" fill="#f59e0b"/>
  <text x="488" y="116" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="700" fill="#92400e" letter-spacing="2">DEPLOY</text>
  <text x="488" y="142" font-family="Arial,Helvetica,sans-serif" font-size="16" font-weight="800" fill="#0f172a">SSH Rollout</text>
  <text x="488" y="162" font-family="Arial,Helvetica,sans-serif" font-size="16" font-weight="800" fill="#0f172a">to Nodes</text>
  <text x="488" y="192" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#64748b">Sync, activate, run</text>
  <text x="488" y="210" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#64748b">hooks, verify health</text>
  <text x="488" y="228" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#64748b">per node.</text>
  <line x1="648" y1="188" x2="684" y2="188" stroke="#10b981" stroke-width="2"/>
  <polygon points="680,183 690,188 680,193" fill="#10b981"/>
  <!-- Public URL -->
  <rect x="690" y="88" width="186" height="200" rx="12" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="690" y="88" width="186" height="5" rx="4" fill="#10b981"/>
  <text x="710" y="116" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="700" fill="#047857" letter-spacing="2">LIVE</text>
  <text x="710" y="142" font-family="Arial,Helvetica,sans-serif" font-size="16" font-weight="800" fill="#0f172a">Public Web</text>
  <text x="710" y="162" font-family="Arial,Helvetica,sans-serif" font-size="16" font-weight="800" fill="#0f172a">App URL</text>
  <text x="710" y="192" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#065f46">End users open the</text>
  <text x="710" y="210" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#065f46">URL. WatchTower</text>
  <text x="710" y="228" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#065f46">keeps it current.</text>
  <!-- Bottom note -->
  <rect x="24" y="308" width="852" height="52" rx="10" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="44" y="330" font-family="Arial,Helvetica,sans-serif" font-size="13" font-weight="700" fill="#0f172a">Own your infrastructure.</text>
  <text x="200" y="330" font-family="Arial,Helvetica,sans-serif" font-size="13" fill="#475569">No hosted platform. Your Linux nodes, your domains, your data.</text>
</svg>
