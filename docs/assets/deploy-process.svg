<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="WatchTower deployment process">
  <defs>
    <filter id="cs" x="-4%" y="-4%" width="112%" height="116%">
      <feDropShadow dx="3" dy="3" stdDeviation="0" flood-color="#1f2937"/>
    </filter>
    <filter id="ps" x="-2%" y="-8%" width="108%" height="132%">
      <feDropShadow dx="2" dy="2" stdDeviation="0" flood-color="#1f2937"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="#fbf6ea"/>
  <circle cx="130" cy="130" r="120" fill="#fde68a" opacity="0.28"/>
  <circle cx="1490" cy="160" r="160" fill="#dbeafe" opacity="0.35"/>
  <text x="80" y="82" font-family="'Space Mono', monospace" font-size="18" font-weight="700" fill="#b91c1c" letter-spacing="2">APP CENTER FLOW</text>
  <text x="80" y="140" font-family="'DM Sans', Arial, sans-serif" font-size="46" font-weight="800" fill="#0f172a">From repo change to live nodes in a visible pipeline.</text>
  <text x="80" y="180" font-family="'DM Sans', Arial, sans-serif" font-size="21" font-weight="500" fill="#475569">Package locally, transfer predictably, activate remotely, and confirm health.</text>
  <rect x="80" y="220" width="1440" height="66" rx="20" fill="#ffffff" stroke="#1f2937" stroke-width="2" filter="url(#cs)"/>
  <rect x="108" y="237" width="638" height="32" rx="16" fill="#fde68a" stroke="#1f2937" stroke-width="1.5" filter="url(#ps)"/>
  <text x="128" y="258" font-family="'DM Sans', Arial, sans-serif" font-size="16" font-weight="700" fill="#7f1d1d">Developer  →  Control Plane  →  Package  →  SSH Sync  →  Activation</text>
  <rect x="80" y="338" width="252" height="284" rx="20" fill="#ffffff" stroke="#1f2937" stroke-width="2" filter="url(#cs)"/>
  <rect x="104" y="360" width="100" height="28" rx="14" fill="#fde68a" stroke="#1f2937" stroke-width="1.5" filter="url(#ps)"/>
  <text x="116" y="379" font-family="'Space Mono', monospace" font-size="14" font-weight="700" fill="#7f1d1d">STEP 01</text>
  <text x="104" y="424" font-family="'DM Sans', Arial, sans-serif" font-size="23" font-weight="800" fill="#0f172a">Select App</text>
  <text x="104" y="462" font-family="'DM Sans', Arial, sans-serif" font-size="16" font-weight="500" fill="#475569">Pick a named workload</text>
  <text x="104" y="484" font-family="'DM Sans', Arial, sans-serif" font-size="16" font-weight="500" fill="#475569">from apps.json or</text>
  <text x="104" y="506" font-family="'DM Sans', Arial, sans-serif" font-size="16" font-weight="500" fill="#475569">the dashboard.</text>
  <line x1="334" y1="480" x2="374" y2="480" stroke="#1f2937" stroke-width="4" stroke-linecap="round"/>
  <polygon points="362,469 386,480 362,491" fill="#1f2937"/>
  <rect x="385" y="338" width="252" height="284" rx="20" fill="#ffffff" stroke="#1f2937" stroke-width="2" filter="url(#cs)"/>
  <rect x="409" y="360" width="100" height="28" rx="14" fill="#fde68a" stroke="#1f2937" stroke-width="1.5" filter="url(#ps)"/>
  <text x="421" y="379" font-family="'Space Mono', monospace" font-size="14" font-weight="700" fill="#7f1d1d">STEP 02</text>
  <text x="409" y="424" font-family="'DM Sans', Arial, sans-serif" font-size="23" font-weight="800" fill="#0f172a">Package Build</text>
  <text x="409" y="462" font-family="'DM Sans', Arial, sans-serif" font-size="16" font-weight="500" fill="#475569">Create tar.gz or zip</text>
  <text x="409" y="484" font-family="'DM Sans', Arial, sans-serif" font-size="16" font-weight="500" fill="#475569">artifacts from the</text>
  <text x="409" y="506" font-family="'DM Sans', Arial, sans-serif" font-size="16" font-weight="500" fill="#475569">chosen source tree.</text>
  <line x1="639" y1="480" x2="679" y2="480" stroke="#1f2937" stroke-width="4" stroke-linecap="round"/>
  <polygon points="667,469 691,480 667,491" fill="#1f2937"/>
  <rect x="690" y="338" width="252" height="284" rx="20" fill="#ffffff" stroke="#1f2937" stroke-width="2" filter="url(#cs)"/>
  <rect x="714" y="360" width="100" height="28" rx="14" fill="#fde68a" stroke="#1f2937" stroke-width="1.5" filter="url(#ps)"/>
  <text x="726" y="379" font-family="'Space Mono', monospace" font-size="14" font-weight="700" fill="#7f1d1d">STEP 03</text>
  <text x="714" y="424" font-family="'DM Sans', Arial, sans-serif" font-size="23" font-weight="800" fill="#0f172a">SSH Transfer</text>
  <text x="714" y="462" font-family="'DM Sans', Arial, sans-serif" font-size="16" font-weight="500" fill="#475569">Sync release payloads</text>
  <text x="714" y="484" font-family="'DM Sans', Arial, sans-serif" font-size="16" font-weight="500" fill="#475569">and metadata to</text>
  <text x="714" y="506" font-family="'DM Sans', Arial, sans-serif" font-size="16" font-weight="500" fill="#475569">selected nodes.</text>
  <line x1="944" y1="480" x2="984" y2="480" stroke="#1f2937" stroke-width="4" stroke-linecap="round"/>
  <polygon points="972,469 996,480 972,491" fill="#1f2937"/>
  <rect x="995" y="338" width="252" height="284" rx="20" fill="#ffffff" stroke="#1f2937" stroke-width="2" filter="url(#cs)"/>
  <rect x="1019" y="360" width="100" height="28" rx="14" fill="#fde68a" stroke="#1f2937" stroke-width="1.5" filter="url(#ps)"/>
  <text x="1031" y="379" font-family="'Space Mono', monospace" font-size="14" font-weight="700" fill="#7f1d1d">STEP 04</text>
  <text x="1019" y="424" font-family="'DM Sans', Arial, sans-serif" font-size="23" font-weight="800" fill="#0f172a">Remote Activate</text>
  <text x="1019" y="462" font-family="'DM Sans', Arial, sans-serif" font-size="16" font-weight="500" fill="#475569">Run build hooks,</text>
  <text x="1019" y="484" font-family="'DM Sans', Arial, sans-serif" font-size="16" font-weight="500" fill="#475569">restart services, and</text>
  <text x="1019" y="506" font-family="'DM Sans', Arial, sans-serif" font-size="16" font-weight="500" fill="#475569">switch live targets.</text>
  <line x1="1249" y1="480" x2="1289" y2="480" stroke="#1f2937" stroke-width="4" stroke-linecap="round"/>
  <polygon points="1277,469 1301,480 1277,491" fill="#1f2937"/>
  <rect x="1300" y="338" width="220" height="284" rx="20" fill="#ffffff" stroke="#1f2937" stroke-width="2" filter="url(#cs)"/>
  <rect x="1324" y="360" width="100" height="28" rx="14" fill="#fde68a" stroke="#1f2937" stroke-width="1.5" filter="url(#ps)"/>
  <text x="1336" y="379" font-family="'Space Mono', monospace" font-size="14" font-weight="700" fill="#7f1d1d">STEP 05</text>
  <text x="1324" y="424" font-family="'DM Sans', Arial, sans-serif" font-size="23" font-weight="800" fill="#0f172a">Health Verify</text>
  <text x="1324" y="462" font-family="'DM Sans', Arial, sans-serif" font-size="16" font-weight="500" fill="#475569">Capture status and</text>
  <text x="1324" y="484" font-family="'DM Sans', Arial, sans-serif" font-size="16" font-weight="500" fill="#475569">expose results back</text>
  <text x="1324" y="506" font-family="'DM Sans', Arial, sans-serif" font-size="16" font-weight="500" fill="#475569">to operators.</text>
  <rect x="80" y="682" width="1440" height="112" rx="20" fill="#fffdf7" stroke="#1f2937" stroke-width="2" filter="url(#cs)"/>
  <text x="116" y="722" font-family="'DM Sans', Arial, sans-serif" font-size="21" font-weight="800" fill="#0f172a">Process outcome</text>
  <text x="116" y="757" font-family="'DM Sans', Arial, sans-serif" font-size="17" font-weight="500" fill="#475569">Five-stage release pipeline with dedicated visuals for GitHub README and GitHub Pages — no text-only setup instructions needed.</text>
</svg>
