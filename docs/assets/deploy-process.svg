<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" role="img" aria-label="WatchTower deployment process">
  <defs>
    <filter id="sh" x="-5%" y="-10%" width="115%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
  </defs>
  <rect width="900" height="380" rx="16" fill="#ffffff"/>
  <rect x="0" y="0" width="900" height="60" rx="0" fill="#0f172a"/>
  <rect x="0" y="0" width="900" height="16" rx="16" fill="#0f172a"/>
  <text x="32" y="26" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="700" fill="#94a3b8" letter-spacing="3">APP CENTER FLOW</text>
  <text x="32" y="48" font-family="Arial,Helvetica,sans-serif" font-size="22" font-weight="800" fill="#ffffff">Five steps from app choice to live service</text>
  <!-- Step cards -->
  <!-- Step 1 -->
  <rect x="24" y="88" width="158" height="260" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="24" y="88" width="158" height="5" rx="4" fill="#f59e0b"/>
  <text x="44" y="118" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="700" fill="#92400e" letter-spacing="2">STEP 1</text>
  <text x="44" y="144" font-family="Arial,Helvetica,sans-serif" font-size="16" font-weight="800" fill="#0f172a">Choose</text>
  <text x="44" y="162" font-family="Arial,Helvetica,sans-serif" font-size="16" font-weight="800" fill="#0f172a">App</text>
  <text x="44" y="192" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#64748b">Pick a named</text>
  <text x="44" y="208" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#64748b">workload from</text>
  <text x="44" y="224" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#64748b">the registry or</text>
  <text x="44" y="240" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#64748b">dashboard.</text>
  <!-- Step 2 -->
  <line x1="182" y1="218" x2="202" y2="218" stroke="#cbd5e1" stroke-width="2"/>
  <polygon points="198,213 208,218 198,223" fill="#cbd5e1"/>
  <rect x="208" y="88" width="158" height="260" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="208" y="88" width="158" height="5" rx="4" fill="#f59e0b"/>
  <text x="228" y="118" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="700" fill="#92400e" letter-spacing="2">STEP 2</text>
  <text x="228" y="144" font-family="Arial,Helvetica,sans-serif" font-size="16" font-weight="800" fill="#0f172a">Build</text>
  <text x="228" y="162" font-family="Arial,Helvetica,sans-serif" font-size="16" font-weight="800" fill="#0f172a">Package</text>
  <text x="228" y="192" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#64748b">Create a tar.gz</text>
  <text x="228" y="208" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#64748b">or zip artifact</text>
  <text x="228" y="224" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#64748b">for this release.</text>
  <!-- Step 3 -->
  <line x1="366" y1="218" x2="386" y2="218" stroke="#cbd5e1" stroke-width="2"/>
  <polygon points="382,213 392,218 382,223" fill="#cbd5e1"/>
  <rect x="392" y="88" width="158" height="260" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="392" y="88" width="158" height="5" rx="4" fill="#f59e0b"/>
  <text x="412" y="118" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="700" fill="#92400e" letter-spacing="2">STEP 3</text>
  <text x="412" y="144" font-family="Arial,Helvetica,sans-serif" font-size="16" font-weight="800" fill="#0f172a">Sync</text>
  <text x="412" y="162" font-family="Arial,Helvetica,sans-serif" font-size="16" font-weight="800" fill="#0f172a">Nodes</text>
  <text x="412" y="192" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#64748b">Transfer artifact</text>
  <text x="412" y="208" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#64748b">and metadata to</text>
  <text x="412" y="224" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#64748b">target nodes via</text>
  <text x="412" y="240" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#64748b">SSH.</text>
  <!-- Step 4 -->
  <line x1="550" y1="218" x2="570" y2="218" stroke="#cbd5e1" stroke-width="2"/>
  <polygon points="566,213 576,218 566,223" fill="#cbd5e1"/>
  <rect x="576" y="88" width="158" height="260" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="576" y="88" width="158" height="5" rx="4" fill="#f59e0b"/>
  <text x="596" y="118" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="700" fill="#92400e" letter-spacing="2">STEP 4</text>
  <text x="596" y="144" font-family="Arial,Helvetica,sans-serif" font-size="16" font-weight="800" fill="#0f172a">Activate</text>
  <text x="596" y="162" font-family="Arial,Helvetica,sans-serif" font-size="16" font-weight="800" fill="#0f172a">Release</text>
  <text x="596" y="192" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#64748b">Run hooks, switch</text>
  <text x="596" y="208" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#64748b">the target, and</text>
  <text x="596" y="224" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#64748b">restart safely.</text>
  <!-- Step 5 -->
  <line x1="734" y1="218" x2="754" y2="218" stroke="#10b981" stroke-width="2"/>
  <polygon points="750,213 760,218 750,223" fill="#10b981"/>
  <rect x="760" y="88" width="116" height="260" rx="12" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="760" y="88" width="116" height="5" rx="4" fill="#10b981"/>
  <text x="780" y="118" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="700" fill="#047857" letter-spacing="2">STEP 5</text>
  <text x="780" y="144" font-family="Arial,Helvetica,sans-serif" font-size="16" font-weight="800" fill="#0f172a">Verify</text>
  <text x="780" y="162" font-family="Arial,Helvetica,sans-serif" font-size="16" font-weight="800" fill="#0f172a">Health</text>
  <text x="780" y="192" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#065f46">WatchTower</text>
  <text x="780" y="208" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#065f46">reports service</text>
  <text x="780" y="224" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#065f46">status back to</text>
  <text x="780" y="240" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#065f46">the operator.</text>
</svg>
