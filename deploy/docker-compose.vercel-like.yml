version: '3.8'

services:
  my-app:
    image: ${APP_IMAGE:-ghcr.io/your-username/your-project:latest}
    container_name: my-app
    ports:
      - "${APP_PORT:-3000}:3000"
    restart: always
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  watchtower:
    image: docker.io/containrrr/watchtower:latest
    container_name: watchtower-deployer
    volumes:
      - ${XDG_RUNTIME_DIR}/podman/podman.sock:/var/run/docker.sock
    environment:
      WATCHTOWER_POLL_INTERVAL: ${WATCHTOWER_POLL_INTERVAL:-30}
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_INCLUDE_STOPPED: "false"
      WATCHTOWER_LABEL_ENABLE: "true"
      WATCHTOWER_NOTIFICATIONS: ${WATCHTOWER_NOTIFICATIONS:-shoutrrr}
      WATCHTOWER_NOTIFICATION_URL: ${WATCHTOWER_NOTIFICATION_URL:-}
      REPO_USER: ${GH_USERNAME:-}
      REPO_PASS: ${GH_PAT_TOKEN:-}
    command: --interval ${WATCHTOWER_POLL_INTERVAL:-30} --debug
    restart: always
