name: WatchTower Preview Images

on:
  push:
    branches-ignore:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read
  packages: write

jobs:
  build-preview-image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sanitize branch tag
        id: branch_tag
        run: |
          BRANCH_TAG="$(printf '%s' "${GITHUB_REF_NAME}" | tr '[:upper:]' '[:lower:]' | sed 's#[^a-z0-9]#-#g' | sed 's#--*#-#g' | sed 's#^-##; s#-$##')"
          echo "value=${BRANCH_TAG}" >> "$GITHUB_OUTPUT"

      - name: Normalize image name
        id: image_name
        run: |
          IMAGE_NAME="$(printf '%s' "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          echo "value=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push preview image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ steps.image_name.outputs.value }}:${{ steps.branch_tag.outputs.value }}
          # Repeat pushes to the same branch reuse the previous build's
          # BuildKit layers + npm wheel cache. Scope per-branch so a slow
          # main-branch push doesn't poison preview caches.
          cache-from: type=gha,scope=preview-${{ steps.branch_tag.outputs.value }}
          cache-to: type=gha,mode=max,scope=preview-${{ steps.branch_tag.outputs.value }}