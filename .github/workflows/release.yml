name: Release

# Triggered by a vX.Y.Z tag pushed via scripts/release.sh
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write   # needed to create releases and upload assets

jobs:
  # ── 1. Python tests ──────────────────────────────────────────────────────────
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r requirements.txt
          pip install pytest

      - name: Pytest
        run: pytest -q

  # ── 2. Create the GitHub Release ─────────────────────────────────────────────
  create-release:
    name: Create GitHub Release
    needs: test
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.gh_release.outputs.upload_url }}
      tag:        ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(python -c "from watchtower import __version__; print(__version__)")
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "ERROR: tag $TAG != package version $PKG_VERSION"
            exit 1
          fi

      - name: Create release
        id: gh_release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

  # ── 3. Build desktop installers (parallel matrix) ───────────────────────────
  build-desktop:
    name: Desktop — ${{ matrix.os }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Each entry's `bundle_target` selects which python-build-standalone
        # archive to download for the in-app Python bundle (1.11+). Empty
        # bundle_target = no bundle for that arch; the .app's launcher
        # falls back to system/pipx Python (legacy 1.10.x behavior).
        # Currently no PBS target exists for armv7l Linux or arm64
        # Windows, so those keep the legacy fallback path.
        # Mac is split into two entries (one per arch) so each DMG ships
        # its own arch-correct Python bundle — a single matrix entry
        # building both arches couldn't disambiguate which bundle goes
        # in which DMG.
        include:
          - os: ubuntu-latest
            bundle_target: "linux-x64"
            eb_args: --linux AppImage deb --x64
            artifact_glob: "desktop/dist/*x64*"
          - os: ubuntu-latest
            bundle_target: "linux-arm64"
            eb_args: --linux AppImage deb --arm64
            artifact_glob: "desktop/dist/*arm64*"
            extra_apt: "gcc-aarch64-linux-gnu"
          - os: ubuntu-latest
            bundle_target: ""
            eb_args: --linux AppImage deb --armv7l
            artifact_glob: "desktop/dist/*armv7l*"
            extra_apt: "gcc-arm-linux-gnueabihf"
          - os: macos-14
            bundle_target: "darwin-arm64"
            eb_args: --mac --arm64
            artifact_glob: "desktop/dist/*arm64*"
            extra_apt: ""
          - os: macos-14
            bundle_target: "darwin-x64"
            eb_args: --mac --x64
            artifact_glob: "desktop/dist/*x64*"
            extra_apt: ""
          # windows-x64: bundle_target deliberately empty as of 1.12.3.
          # The python-build-standalone cross-install path runs but takes
          # 45+ min on Windows runners (Defender scanning every wheel
          # extract on NTFS) and on the v1.12.2 attempt didn't finish
          # within 45 min — same effective hang shape as v1.12.1's
          # native-install pip self-replace deadlock, just a different
          # cause. Until we move the bundle build off the Windows
          # runner (e.g. run cross-install on Linux + upload artifact),
          # Windows x64 users fall back to the system/pipx Python path
          # in main.js's resolvePython(), same as windows-arm64 and
          # linux-armv7l (which never had a PBS target). Mac + Linux x64
          # + Linux arm64 still get the bundled Python.
          - os: windows-latest
            bundle_target: ""
            eb_args: --win --x64
            artifact_glob: "desktop/dist/*x64*"
            extra_apt: ""
          - os: windows-latest
            bundle_target: ""
            eb_args: --win --arm64
            artifact_glob: "desktop/dist/*arm64*"
            extra_apt: ""

    steps:
      - uses: actions/checkout@v4

      # ── ARM cross-compile toolchain (Linux ARM64/armv7l only) ───────────────
      - name: Install ARM cross-compiler
        if: matrix.extra_apt != ''
        run: |
          sudo apt-get update -q
          sudo apt-get install -y ${{ matrix.extra_apt }}

      # ── Build the React frontend first (web/dist/) ──────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        # Wrapped in a 3-attempt retry with backoff because npm/registry
        # transient failures (mainly 502s during postinstall scripts that
        # download arch-specific binaries) routinely fail entire release
        # builds. Caught us on v1.9.0 — the macOS-14 leg lost a 502 from
        # Electron's binary mirror and the whole release shipped without
        # any .dmg artifacts. Cheap to retry, never re-runs on the
        # "command actually broken" case (exit code 1 each time).
        run: |
          for attempt in 1 2 3; do
            if npm --prefix web install; then exit 0; fi
            echo "::warning::npm install (web) failed on attempt $attempt; retrying after backoff"
            sleep $((attempt * 20))
          done
          exit 1
        shell: bash

      - name: Build frontend (web/dist)
        run: npm --prefix web run build

      # ── Build the Electron desktop app ─────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Pillow (installer image generation)
        run: pip install Pillow

      - name: Install desktop dependencies
        # Same retry pattern as the web step above. Electron's
        # post-install script downloads a ~150 MB platform-specific
        # binary; that's the most common 502 source in this workflow.
        run: |
          for attempt in 1 2 3; do
            if npm --prefix desktop install; then exit 0; fi
            echo "::warning::npm install (desktop) failed on attempt $attempt; retrying after backoff"
            sleep $((attempt * 20))
          done
          exit 1
        shell: bash

      # ── Build the bundled Python (1.11+) ───────────────────────────────────
      # Downloads python-build-standalone for the matrix arch, installs
      # watchtower + dependencies into it, drops the result at
      # desktop/python-bundle/python/ where electron-builder picks it up
      # via extraResources. Skipped for arches without a PBS target
      # (armv7l Linux, arm64 Windows) — those .apps fall back to the
      # legacy pipx-Python launcher path.
      - name: Build bundled Python (${{ matrix.bundle_target }})
        if: matrix.bundle_target != ''
        run: |
          # The script's own pip-cross-install path needs a working host
          # Python — provided by setup-python above.
          chmod +x scripts/build-python-bundle.sh
          TARGET=${{ matrix.bundle_target }} ./scripts/build-python-bundle.sh
          ls -la desktop/python-bundle/python | head -5
        shell: bash

      - name: Create empty Python bundle placeholder (no PBS target for this arch)
        if: matrix.bundle_target == ''
        # extraResources in package.json points at desktop/python-bundle/python.
        # When we skip the real bundle (armv7l Linux, arm64 Windows — no
        # PBS target exists), electron-builder still needs the dir to
        # exist or `extraResources` errors out. A lone .placeholder file
        # is enough — main.js's resolvePython() detects no python3 here
        # and falls back to the legacy pipx path.
        run: |
          mkdir -p desktop/python-bundle/python
          echo "no bundled python for this arch — falls back to system/pipx" > desktop/python-bundle/python/.placeholder
        shell: bash

      - name: Build & publish installers
        # --publish always: electron-builder uploads each artifact to the
        # already-created GitHub Release for this tag.
        run: npm --prefix desktop run dist -- ${{ matrix.eb_args }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Ensure electron-builder finds the pre-built frontend
          WEB_DIST: ${{ github.workspace }}/web/dist

      # ── Smoke test (Linux x64 only): launch the AppImage headless,
      # confirm the bundled launcher resolves a Python with the watchtower
      # backend installed, and verify /health responds within 90 s.
      #
      # Catches the regressions that broke v1.5.0–1.5.5 (lifespan deadlock,
      # spawn npm ENOENT, missing web/dist, etc.) AND the structural
      # "AppImage has no .venv" issue — by simulating an end-user install
      # where the only Python with watchtower available is the system one,
      # not a sibling source clone.
      #
      # Only x64 because cross-arch AppImages can't run on the x86_64 runner.
      - name: Smoke-test Linux AppImage
        if: matrix.os == 'ubuntu-latest' && contains(matrix.eb_args, '--x64')
        run: |
          set -eo pipefail

          APPIMAGE=$(ls desktop/dist/*x86_64*.AppImage 2>/dev/null | head -1)
          if [ -z "$APPIMAGE" ]; then
            echo "::error::No x86_64 AppImage produced — desktop build silently failed."
            exit 1
          fi
          chmod +x "$APPIMAGE"
          echo "Smoke-testing: $APPIMAGE"

          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends xvfb libfuse2 python3-pip

          # Install the backend system-wide so resolvePython() finds it
          # via the system-python fallback. This simulates a real
          # end-user install (`pip install watchtower-podman` after
          # downloading the AppImage). We use `pip install -e .` from
          # the checked-out source instead of pulling from PyPI so we
          # test the code in this commit, not whatever's on PyPI.
          python3 -m pip install --break-system-packages --upgrade pip
          python3 -m pip install --break-system-packages -r requirements.txt
          python3 -m pip install --break-system-packages -e .
          python3 -c "import watchtower; print('backend importable')"

          # Move the dev clone's .venv aside so resolvePython() can't fall
          # back to it — we want to verify the system-python path works.
          if [ -d .venv ]; then mv .venv .venv-hidden-during-smoke-test; fi

          export HOME=$(mktemp -d)
          export WATCHTOWER_DATA_DIR="$HOME/.watchtower"
          # Run from the AppImage's own working dir, not the source clone,
          # so repoRoot resolution exercises the system-python path.
          mkdir -p "$HOME/sandbox"
          cp "$APPIMAGE" "$HOME/sandbox/"
          cd "$HOME/sandbox"

          xvfb-run -a "./$(basename "$APPIMAGE")" --no-sandbox &
          APP_PID=$!
          trap 'kill $APP_PID 2>/dev/null || true' EXIT

          DEADLINE=$((SECONDS + 90))
          while [ $SECONDS -lt $DEADLINE ]; do
            if curl -fsS -m 3 http://127.0.0.1:8000/health > /tmp/health.json 2>/dev/null; then
              echo "::notice::Backend responded within $SECONDS s:"
              cat /tmp/health.json
              grep -q '"watchtower-api"' /tmp/health.json
              echo "::notice::Smoke test passed."
              exit 0
            fi
            if ! kill -0 "$APP_PID" 2>/dev/null; then
              echo "::error::Desktop process exited before backend responded."
              for log in "$HOME/.watchtower/logs/desktop-backend.log" \
                         "$HOME/sandbox/.dev/desktop-backend.log"; do
                if [ -f "$log" ]; then
                  echo "::group::Backend log ($log)"
                  cat "$log"
                  echo "::endgroup::"
                fi
              done
              exit 1
            fi
            sleep 2
          done

          echo "::error::Backend never reached /health within 90 s."
          # Print every backend log we can find so the failure mode is
          # actually diagnosable from the workflow output. Without this
          # we'd cut another release tag just to add prints.
          echo "::group::Searching for backend logs..."
          find "$HOME" -name 'desktop-backend.log' 2>/dev/null || true
          echo "::endgroup::"
          for log in "$HOME/.watchtower/logs/desktop-backend.log" \
                     "$HOME/sandbox/.dev/desktop-backend.log"; do
            if [ -f "$log" ]; then
              echo "::group::Backend log ($log)"
              cat "$log"
              echo "::endgroup::"
            fi
          done
          exit 1
