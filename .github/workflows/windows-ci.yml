name: Windows CI

on:
  push:
    branches:
      - main
    paths:
      - 'install/**/*.ps1'
      - 'install/**/*.cmd'
      - 'requirements.txt'
      - 'pyproject.toml'
      - '.github/workflows/windows-ci.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'install/**/*.ps1'
      - 'install/**/*.cmd'
      - 'requirements.txt'
      - 'pyproject.toml'
      - '.github/workflows/windows-ci.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: windows-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-windows-scripts:
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      - name: Validate PowerShell syntax
        shell: pwsh
        run: |
          # Do NOT set StrictMode here: the foreach loop needs to shadow the
          # automatic $Error variable with $ParseError, which strict mode blocks.
          $ErrorActionPreference = 'Stop'

          $ErrorCount = 0
          $ScriptsToCheck = @(
            'install/install_windows.ps1',
            'install/run_app_center_windows.ps1'
          )

          foreach ($Script in $ScriptsToCheck) {
            Write-Host "Validating $Script..."
            # ParseFile signature: ParseFile(path, [ref]tokens, [ref]errors)
            # We only care about errors, so pass $null for tokens.
            $ScriptErrors = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile(
              (Resolve-Path $Script).Path,
              [ref]$null,
              [ref]$ScriptErrors
            )
            if ($ScriptErrors -and $ScriptErrors.Count -gt 0) {
              Write-Host "ERROR: Syntax errors in $Script" -ForegroundColor Red
              foreach ($PE in $ScriptErrors) {
                Write-Host "  Line $($PE.Extent.StartLineNumber): $($PE.Message)"
              }
              $ErrorCount += $ScriptErrors.Count
            } else {
              Write-Host "✓ $Script syntax OK" -ForegroundColor Green
            }
          }

          if ($ErrorCount -gt 0) {
            Write-Host "Failed: $ErrorCount syntax errors found" -ForegroundColor Red
            exit 1
          }

      - name: Install Python dependencies
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Set-StrictMode -Version Latest

          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run Windows installer script
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Set-StrictMode -Version Latest

          $InstallDir = Join-Path $env:RUNNER_TEMP "WatchTowerAppCenter"
          $ConfigDir = Join-Path $env:RUNNER_TEMP "WatchTowerConfig"
          
          Write-Host "InstallDir: $InstallDir"
          Write-Host "ConfigDir: $ConfigDir"
          
          pwsh -NoProfile -NonInteractive -ExecutionPolicy Bypass -File "install/install_windows.ps1" `
            -InstallDir "$InstallDir" `
            -ConfigDir "$ConfigDir" `
            -Port 8000

      - name: Start App Center runner script (background)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Set-StrictMode -Version Latest

          $InstallDir = Join-Path $env:RUNNER_TEMP "WatchTowerAppCenter"
          $ConfigDir = Join-Path $env:RUNNER_TEMP "WatchTowerConfig"
          
          Start-Process -FilePath pwsh `
            -ArgumentList "-NoProfile -NonInteractive -ExecutionPolicy Bypass -File '$InstallDir\install\run_app_center_windows.ps1' -InstallDir '$InstallDir' -ConfigDir '$ConfigDir'" `
            -NoNewWindow -PassThru `
            -RedirectStandardOutput "api.log" `
            -RedirectStandardError "api-error.log" `
            | Out-Null
          
          Write-Host "Backend started, waiting for health check..."
          Start-Sleep -Seconds 3

      - name: Health check
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Set-StrictMode -Version Latest

          $MaxRetries = 10
          $RetryCount = 0
          
          while ($RetryCount -lt $MaxRetries) {
            try {
              $HealthData = Invoke-RestMethod -Uri "http://127.0.0.1:8000/health" -TimeoutSec 5
              
              if ($HealthData.status) {
                Write-Host "✓ Health check passed" -ForegroundColor Green
                Write-Host "Status: $($HealthData.status)"
                exit 0
              }
            } catch {
              $RetryCount++
              if ($RetryCount -lt $MaxRetries) {
                Write-Host "Retry $RetryCount/$MaxRetries..."
                Start-Sleep -Seconds 2
              }
            }
          }
          
          Write-Host "✗ Health check failed after $MaxRetries retries" -ForegroundColor Red
          Write-Host "API log:" -ForegroundColor Red
          Get-Content -Path "api.log" -ErrorAction SilentlyContinue | Write-Host
          Write-Host "API error log:" -ForegroundColor Red
          Get-Content -Path "api-error.log" -ErrorAction SilentlyContinue | Write-Host
          exit 1

      - name: Stop API
        shell: pwsh
        if: always()
        run: |
          # SilentlyContinue here — CIM queries may return $null on some runners.
          $ErrorActionPreference = 'SilentlyContinue'

          Get-CimInstance Win32_Process -ErrorAction SilentlyContinue | Where-Object {
            ($_.Name -match '^python(\.exe)?$|^powershell(\.exe)?$|^pwsh(\.exe)?$') -and (
              $_.CommandLine -like "*watchtower.deploy_server*" -or
              $_.CommandLine -like "*run_app_center_windows.ps1*" -or
              $_.CommandLine -like "*uvicorn*watchtower.api:app*"
            )
          } | ForEach-Object {
            Stop-Process -Id $_.ProcessId -Force -ErrorAction SilentlyContinue
          }
          Start-Sleep -Seconds 1

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: windows-ci-logs
          path: |
            api.log
            api-error.log
          retention-days: 7

