name: Windows CI

on:
  push:
    branches:
      - main
    paths:
      - 'install/**/*.ps1'
      - 'install/**/*.cmd'
      - 'requirements.txt'
      - 'pyproject.toml'
      - '.github/workflows/windows-ci.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'install/**/*.ps1'
      - 'install/**/*.cmd'
      - 'requirements.txt'
      - 'pyproject.toml'
      - '.github/workflows/windows-ci.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: windows-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-windows-scripts:
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      - name: Validate PowerShell syntax
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $ErrorCount = 0
          $ScriptsToCheck = @(
            'install/install_windows.ps1',
            'install/run_app_center_windows.ps1'
          )

          foreach ($Script in $ScriptsToCheck) {
            Write-Host "Validating $Script..."
            # Use ParseInput with explicit UTF-8 to avoid any encoding issues
            $Content = Get-Content -Path $Script -Raw -Encoding UTF8
            $ScriptErrors = $null
            $null = [System.Management.Automation.Language.Parser]::ParseInput(
              $Content,
              [ref]$null,
              [ref]$ScriptErrors
            )
            if ($ScriptErrors -and $ScriptErrors.Count -gt 0) {
              Write-Host "ERROR: Syntax errors in $Script" -ForegroundColor Red
              foreach ($PE in $ScriptErrors) {
                $Msg = $PE.Message
                $Line = $PE.Extent.StartLineNumber
                $Col = $PE.Extent.StartColumnNumber
                Write-Host "  ${Script}:${Line}:${Col}: $Msg"
                # Emit as a GitHub Actions annotation so it shows in the PR
                Write-Host "::error file=${Script},line=${Line},col=${Col}::$Msg"
              }
              $ErrorCount += $ScriptErrors.Count
            } else {
              Write-Host "OK: $Script syntax valid"
            }
          }

          if ($ErrorCount -gt 0) {
            Write-Host "Failed: $ErrorCount syntax errors found" -ForegroundColor Red
            exit 1
          }

      - name: Install Python dependencies
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Set-StrictMode -Version Latest

          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run Windows installer script
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Set-StrictMode -Version Latest

          $InstallDir = Join-Path $env:RUNNER_TEMP "WatchTowerAppCenter"
          $ConfigDir = Join-Path $env:RUNNER_TEMP "WatchTowerConfig"
          
          Write-Host "InstallDir: $InstallDir"
          Write-Host "ConfigDir: $ConfigDir"
          
          pwsh -NoProfile -NonInteractive -ExecutionPolicy Bypass -File "install/install_windows.ps1" `
            -InstallDir "$InstallDir" `
            -ConfigDir "$ConfigDir" `
            -Port 8000

      - name: Start App Center and health check
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Set-StrictMode -Version Latest

          $InstallDir = Join-Path $env:RUNNER_TEMP "WatchTowerAppCenter"
          $ConfigDir = Join-Path $env:RUNNER_TEMP "WatchTowerConfig"
          $RunnerScript = Join-Path $InstallDir "install\run_app_center_windows.ps1"

          $PwshArgs = @(
            '-NoProfile',
            '-NonInteractive',
            '-ExecutionPolicy', 'Bypass',
            '-File', $RunnerScript,
            '-InstallDir', $InstallDir,
            '-ConfigDir', $ConfigDir
          )

          $ApiProcess = Start-Process -FilePath pwsh `
            -ArgumentList $PwshArgs `
            -NoNewWindow -PassThru `
            -RedirectStandardOutput "api.log" `
            -RedirectStandardError "api-error.log"

          Write-Host "Started App Center process PID: $($ApiProcess.Id)"
          Start-Sleep -Seconds 2

          $MaxRetries = 30
          $RetryDelaySeconds = 3
          $RetryCount = 0
          $LastProbeError = ""
          
          while ($RetryCount -lt $MaxRetries) {
            if (-not (Get-Process -Id $ApiProcess.Id -ErrorAction SilentlyContinue)) {
              Write-Host "App Center process exited during startup checks."
            }

            $Response = curl.exe -sS --noproxy "*" --max-time 5 http://127.0.0.1:8000/health 2>&1
            if ($LASTEXITCODE -eq 0) {
              Write-Host "✓ Health check passed" -ForegroundColor Green
              Write-Host "Response: $Response"
              exit 0
            }

            $RetryCount++
            $LastProbeError = "$Response"
            if ($RetryCount -lt $MaxRetries) {
              Write-Host "Retry $RetryCount/$MaxRetries failed: $LastProbeError"
              Start-Sleep -Seconds $RetryDelaySeconds
            }
          }
          
          Write-Host "✗ Health check failed after $MaxRetries retries" -ForegroundColor Red
          Write-Host "----- api.log -----"
          Get-Content -Path "api.log" -ErrorAction SilentlyContinue | Write-Host
          Write-Host "----- api-error.log -----"
          Get-Content -Path "api-error.log" -ErrorAction SilentlyContinue | Write-Host

          # One clear annotation in the PR view. The full logs above and the
          # uploaded artifact ("windows-ci-logs") have everything needed for
          # triage — emitting one annotation per log line previously turned
          # every uvicorn INFO line into a red "Error:" row, which read as
          # noise. Keep the logs as Write-Host output, surface the actual
          # cause once.
          Write-Host "::error file=.github/workflows/windows-ci.yml,line=1::App Center health check failed after $MaxRetries retries. Last probe error: $LastProbeError. See run logs and the windows-ci-logs artifact for api.log / api-error.log."

          exit 1

      - name: Stop API
        shell: pwsh
        if: always()
        run: |
          # SilentlyContinue here — CIM queries may return $null on some runners.
          $ErrorActionPreference = 'SilentlyContinue'

          Get-CimInstance Win32_Process -ErrorAction SilentlyContinue | Where-Object {
            ($_.Name -match '^python(\.exe)?$|^powershell(\.exe)?$|^pwsh(\.exe)?$') -and (
              $_.CommandLine -like "*watchtower.deploy_server*" -or
              $_.CommandLine -like "*run_app_center_windows.ps1*" -or
              $_.CommandLine -like "*uvicorn*watchtower.api:app*"
            )
          } | ForEach-Object {
            Stop-Process -Id $_.ProcessId -Force -ErrorAction SilentlyContinue
          }
          Start-Sleep -Seconds 1

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: windows-ci-logs
          path: |
            api.log
            api-error.log
          retention-days: 7

