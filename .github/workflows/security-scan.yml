name: Security Scan

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  filesystem-scan:
    name: Trivy Filesystem Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          format: table
          exit-code: '1'

  container-scan:
    name: Trivy Container Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build container image
        # Reuse the GHA layer cache populated by publish-container.yml
        # (read-only — never write from this workflow). Without buildx
        # + cache-from, every PR rebuilt the apt + pip + npm layers from
        # scratch, ~5 minutes per run on a path that's just a security
        # gate. `load: true` keeps the image addressable for trivy below.
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: watchtower:security-scan
          cache-from: type=gha

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          image-ref: watchtower:security-scan
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          format: table
          exit-code: '1'
