name: Build Desktop Installers

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            args: --linux AppImage deb
            artifact: watchtower-desktop-linux
          - os: macos-latest
            args: --mac dmg zip
            artifact: watchtower-desktop-macos
          - os: windows-latest
            args: --win nsis zip
            artifact: watchtower-desktop-windows

    defaults:
      run:
        working-directory: desktop

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Pillow (for installer image generation)
        run: pip install Pillow

      - name: Install dependencies
        run: npm install

      - name: Build installers
        run: npm run dist -- ${{ matrix.args }}

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: desktop/dist/*
          if-no-files-found: error
