name: Build VS Code Extension

on:
  push:
    paths:
      - "vscode-extension/**"
    branches: ["main", "feature/**"]
  pull_request:
    paths:
      - "vscode-extension/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vscode-extension

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: vscode-extension/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Compile TypeScript
        run: npm run compile

      - name: Lint
        run: npm run lint || true   # non-blocking for now

      - name: Package extension
        run: npx vsce package --no-dependencies -o watchtower-extension.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: watchtower-vscode-extension
          path: vscode-extension/watchtower-extension.vsix
          retention-days: 30

  publish:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    environment: vscode-marketplace
    defaults:
      run:
        working-directory: vscode-extension
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: vscode-extension/package-lock.json

      - run: npm ci
      - run: npm run compile

      - name: Check published extension version
        id: published-version
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          PUBLISHED_VERSION=$(npx @vscode/vsce show sinhaankur.watchtower-podman --json | node -e "let input=''; process.stdin.on('data', (chunk) => input += chunk); process.stdin.on('end', () => { try { const parsed = JSON.parse(input); const versions = Array.isArray(parsed.versions) ? parsed.versions : []; process.stdout.write(versions[0]?.version || ''); } catch { process.stdout.write(''); } });")
          echo "current=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          echo "published=$PUBLISHED_VERSION" >> "$GITHUB_OUTPUT"
          if [ "$CURRENT_VERSION" = "$PUBLISHED_VERSION" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Extension version $CURRENT_VERSION is already published; skipping marketplace publish."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Publishing extension version $CURRENT_VERSION (latest marketplace version: ${PUBLISHED_VERSION:-none})."
          fi

      - name: Publish to Marketplace
        if: steps.published-version.outputs.skip != 'true'
        run: npx vsce publish --no-dependencies
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
